<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CX-50 Garage</title>
  <meta name="description" content="2023 Mazda CX-50 Turbo — Meridian Edition owner companion. Track maintenance, mods, fuel economy, and more." />

  <!-- Open Graph -->
  <meta property="og:title" content="CX-50 Garage" />
  <meta property="og:description" content="2023 Mazda CX-50 Turbo — Meridian Edition owner companion PWA" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="icons/icon-512.png" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F8F7F4" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CX-50 Garage" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/styles/main.css" />
  <!-- Apply theme before paint to avoid flash -->
  <script>
    (function(){
      var t = localStorage.getItem('cx50_theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div id="update-banner" aria-live="polite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
    <span>Update available</span>
    <button onclick="applyUpdate()">Refresh</button>
  </div>

  <div id="app">
    <button id="theme-toggle" onclick="App.toggleTheme()" aria-label="Toggle dark mode"></button>
    <div id="view-container"></div>

    <nav id="bottom-nav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="maintenance">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <span>Service</span>
      </button>
      <button class="nav-item" data-view="mods">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>Mods</span>
      </button>
      <button class="nav-item" data-view="fuel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 22V6a2 2 0 012-2h8a2 2 0 012 2v16"/><path d="M17 14h1a2 2 0 012 2v2a1 1 0 001 1 1 1 0 001-1V9l-3-3"/><path d="M3 22h14"/><rect x="6" y="8" width="5" height="4" rx="1"/></svg>
        <span>Fuel</span>
      </button>
      <button class="nav-item" data-view="documents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>My CX-50</span>
      </button>
      <button class="nav-item" data-view="reference">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span>Guide</span>
      </button>
    </nav>
  </div>

  <script src="src/data/reference.js"></script>
  <script src="src/app.js"></script>
  <script src="src/views/dashboard.js"></script>
  <script src="src/views/maintenance.js"></script>
  <script src="src/views/mods.js"></script>
  <script src="src/views/fuel.js"></script>
  <script src="src/views/documents.js"></script>
  <script src="src/views/reference.js"></script>
  <script>
    App.init();

    let _swRegistration = null;

    function showUpdateBanner() {
      document.getElementById('update-banner').classList.add('visible');
    }

    function applyUpdate() {
      if (_swRegistration?.waiting) {
        _swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    }

    /* ── Install prompt (Android) ─────────────────────── */
    let _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _deferredInstallPrompt = e;
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {

        navigator.serviceWorker.register('sw.js')
          .then(reg => {
            _swRegistration = reg;

            // New SW already waiting when the page loaded (e.g. opened after a deploy)
            if (reg.waiting) showUpdateBanner();

            // New SW found while the page is open
            reg.addEventListener('updatefound', () => {
              reg.installing.addEventListener('statechange', function () {
                if (this.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBanner();
                }
              });
            });

            // Re-check for a new SW when the user brings the app back into focus
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
          })
          .catch(() => {});

        // When the new SW takes control, reload once to run fresh assets
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) { refreshing = true; window.location.reload(); }
        });

      });
    }
  </script>
</body>
</html>
